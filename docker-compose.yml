version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stpoints-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stpoints
      POSTGRES_PASSWORD: stpoints_dev_2024
      POSTGRES_DB: stpoints
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stpoints"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stpoints-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stpoints.fun
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
